name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  core:
    name: Python ${{ matrix.python }} / Pydantic ${{ matrix.pydantic_label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.10"
            pydantic_spec: ">=1.10,<2"
            pydantic_label: "1"
          - python: "3.10"
            pydantic_spec: ">=2,<3"
            pydantic_label: "2"
          - python: "3.12"
            pydantic_spec: ">=1.10,<2"
            pydantic_label: "1"
          - python: "3.12"
            pydantic_spec: ">=2,<3"
            pydantic_label: "2"
          - python: "3.14"
            pydantic_spec: ">=2,<3"
            pydantic_label: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package
        run: python -m pip install -e . "pytest>=8" "pydantic${{ matrix.pydantic_spec }}"
      - name: Test
        run: python -m pytest -q -m "not optional"

  optional-integrations:
    name: FastAPI and NATS integrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with optional integrations
        run: python -m pip install -e ".[test]"
      - name: Test
        run: python -m pytest -q
